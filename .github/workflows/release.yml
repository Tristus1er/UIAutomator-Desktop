name: Build installers

# Builds the native installers for all three desktop platforms. jpackage can
# only produce an installer for the OS it runs on, so each format is built on
# its own runner:
#   - Windows  → .msi   (windows-latest)
#   - macOS    → .dmg   (macos-latest)
#   - Linux    → .deb   (ubuntu-latest)
#
# Triggers:
#   - pushing a tag like v1.2.3  → builds, then attaches the installers to a
#     GitHub Release for that tag (version derived from the tag);
#   - manual run (workflow_dispatch) → builds and uploads the installers as
#     workflow artifacts you can download from the run page.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create the Release and upload its assets

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Non-release tasks on purpose: the *release* variant runs ProGuard,
          # which can rename/strip the kotlinx.serialization classes this app
          # relies on for sessions and rules — a build that passes but crashes
          # at runtime. These installers are larger but always correct.
          - os: windows-latest
            name: Windows (msi)
            task: packageMsi
            artifact_glob: composeApp/build/compose/binaries/main/msi/*.msi
          - os: macos-latest
            name: macOS (dmg)
            task: packageDmg
            artifact_glob: composeApp/build/compose/binaries/main/dmg/*.dmg
          - os: ubuntu-latest
            name: Linux (deb)
            task: packageDeb
            artifact_glob: composeApp/build/compose/binaries/main/deb/*.deb

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Derive the jpackage version from the tag (v1.2.3 → 1.2.3); manual runs
      # fall back to the default version baked into build.gradle.kts.
      - name: Compute version from tag
        id: version
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME}"
          if [[ "$ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "appVersion=${ref#v}" >> "$GITHUB_OUTPUT"
          else
            echo "appVersion=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build installer
        shell: bash
        run: |
          args=""
          if [ -n "${{ steps.version.outputs.appVersion }}" ]; then
            args="-PappVersion=${{ steps.version.outputs.appVersion }}"
          fi
          ./gradlew :composeApp:${{ matrix.task }} --no-daemon --stacktrace $args

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Attach installers to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/**/*
          generate_release_notes: true
